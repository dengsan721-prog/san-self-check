<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>幸福自检表测试</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; margin: 32px; color: #202124; }
    .pass { color: #0f7b45; }
    .fail { color: #b42318; }
    li { margin: 8px 0; }
  </style>
</head>
<body>
  <h1>幸福自检表测试</h1>
  <ol id="results"></ol>
  <script src="./app.js?v=salon-note-3"></script>
  <script>
    const results = document.querySelector("#results");

    function record(name, passed, detail) {
      const item = document.createElement("li");
      item.className = passed ? "pass" : "fail";
      item.textContent = `${passed ? "PASS" : "FAIL"} - ${name}${detail ? " - " + detail : ""}`;
      results.appendChild(item);
    }

    function assertEqual(name, actual, expected) {
      record(name, Object.is(actual, expected), `actual: ${actual}, expected: ${expected}`);
    }

    function assertTrue(name, value) {
      record(name, Boolean(value), `actual: ${value}`);
    }

    try {
      const allBest = HappinessDemo.QUESTIONS.map((question) => question.options.findIndex((option) => option.score === 3));
      const allLowest = HappinessDemo.QUESTIONS.map((question) => question.options.findIndex((option) => option.score === 0));
      const mixed = HappinessDemo.QUESTIONS.map((question, index) => index % 4);

      const bestResult = HappinessDemo.calculateResult(allBest);
      const lowResult = HappinessDemo.calculateResult(allLowest);
      const mixedResult = HappinessDemo.calculateResult(mixed);

      assertEqual("has 20 questions", HappinessDemo.QUESTIONS.length, 20);
      assertTrue("every question has 4 options", HappinessDemo.QUESTIONS.every((question) => question.options.length === 4));
      assertTrue("every question uses 0 to 3 scoring", HappinessDemo.QUESTIONS.every((question) => {
        const scores = question.options.map((option) => option.score).sort((a, b) => a - b).join(",");
        return scores === "0,1,2,3";
      }));
      assertTrue("options are not all ordered from best to worst", HappinessDemo.QUESTIONS.some((question) => {
        return question.options.map((option) => option.score).join(",") !== "3,2,1,0";
      }));
      assertEqual("best raw score is 60", bestResult.rawScore, 60);
      assertEqual("best total score is 100", bestResult.totalScore, 100);
      assertEqual("best index is 100", bestResult.indexScore, 100);
      assertEqual("lowest total score is 0", lowResult.totalScore, 0);
      assertEqual("lowest index is 0", lowResult.indexScore, 0);
      assertEqual("pass line is 60", bestResult.passLine, 60);
      assertEqual("best result level", bestResult.level.title, "幸福基础优秀");
      assertEqual("lowest result level", lowResult.level.title, "未达及格线，建议优先梳理");
      assertTrue("dimensions expose percentage scores", bestResult.dimensions.every((dimension) => dimension.percentScore === 100));
      assertTrue("mixed result has an advantage dimension", mixedResult.strongest.label.length > 0);
      assertTrue("mixed result has a focus dimension", mixedResult.weakest.label.length > 0);
      assertEqual("empty lead is invalid", HappinessDemo.validateLead({ name: "", contact: "" }).valid, false);
      assertEqual("complete lead is valid", HappinessDemo.validateLead({ name: "王女士", contact: "wx123" }).valid, true);
      assertEqual("footer quote is available", HappinessDemo.FOOTER_QUOTE, "如果你不幸福，那长寿就是延长痛苦！");
      assertEqual("truth hint is available", HappinessDemo.TRUTH_HINT, "请按最近 30 天最常发生的真实情况选择，不选应该怎么做，只选更像你家的样子。");
      assertEqual("question 14 title is corrected", HappinessDemo.QUESTIONS[13].text, "在外人面前聊到家人时，你平常是哪种状态？");
      assertEqual(
        "question 15 busy response is scenario based",
        HappinessDemo.QUESTIONS[14].options.find((option) => option.score === 1).text,
        "先不理，想着等忙完再说，但后来有时就忘了"
      );
      assertEqual("application success constants are removed", "APPLICATION_SUCCESS_TITLE" in HappinessDemo, false);
      assertEqual("success page constants are removed", "SUCCESS_NEXT_STEP" in HappinessDemo, false);
      assertEqual("radar uses refined 5-layer grid", HappinessDemo.RADAR_RING_COUNT, 5);
      assertEqual("start button arrow is hidden", HappinessDemo.SHOW_START_ARROW, false);
      assertEqual("radar label shortens dimension name", HappinessDemo.getRadarLabel("亲密互信（关系）").short, "亲密互信");
      assertEqual("radar label keeps parenthetical detail", HappinessDemo.getRadarLabel("亲密互信（关系）").detail, "（关系）");
      assertEqual("home illustration path is available", HappinessDemo.HERO_IMAGE, "./assets/happy-family-hero.jpg");
      assertEqual("result mantra is removed", "RESULT_MANTRA" in HappinessDemo, false);
      assertEqual("question dimension label is hidden", HappinessDemo.SHOW_QUESTION_DIMENSION_LABEL, false);
      assertEqual("result title text is available", HappinessDemo.RESULT_TITLE_TEXT, "你的自检结果");
      assertEqual("expert analysis title is available", HappinessDemo.EXPERT_ANALYSIS_TITLE, "专家团分析解读");
      assertEqual("salon CTA points to happiness action", HappinessDemo.SALON_CTA_TEXT, "我要幸福");
      assertEqual("lead page title is free salon", HappinessDemo.LEAD_PAGE_TITLE, "我申请参加幸福沙龙");
      assertEqual(
        "salon promise is simple and direct",
        HappinessDemo.SALON_PROMISE,
        "你想要解决的问题其实很简单，参加完免费幸福沙龙，你自己就能找到问题的原因，自己解决。"
      );
      assertEqual("salon question one is direct", HappinessDemo.SALON_QUESTION_ONE, "想一阵子解决问题，还是一辈子解决问题？");
      assertEqual("salon question two is direct", HappinessDemo.SALON_QUESTION_TWO, "想要一阵子幸福，还是一辈子幸福？");
      assertEqual("salon reason line is separated", HappinessDemo.SALON_REASON_LINE, "找到源头，看清原因，你才能真正知道怎么解决问题。");
      assertEqual("salon screenshot note is available", HappinessDemo.SALON_SCREENSHOT_NOTE, "截图本页面发送给驿站主老师，申请参加免费幸福沙龙");
      assertTrue("lead page keeps original long-form guidance", HappinessDemo.LEAD_PAGE_COPY.includes("不是一阵子解决问题"));
      assertEqual("salon explanation is segmented", HappinessDemo.SALON_APPLICATION_NOTES.length, 4);
      assertTrue("salon explanation keeps full queueing detail", HappinessDemo.SALON_APPLICATION_NOTE.includes("提前排队预约"));
      assertEqual("expert analysis has ten score bands", HappinessDemo.EXPERT_SCORE_BANDS.length, 10);
      assertEqual("expert band changes every ten points", HappinessDemo.getExpertBand(9).range, "0-9");
      assertEqual("expert band for ten points", HappinessDemo.getExpertBand(10).range, "10-19");
      assertEqual("expert band for ninety points", HappinessDemo.getExpertBand(90).range, "90-100");
      assertTrue("expert analysis removes old challenge label", !HappinessDemo.renderExpertAnalysis(mixedResult).includes("专家团质询"));
      assertTrue("expert analysis uses vivid mirror language", HappinessDemo.renderExpertAnalysis(mixedResult).includes("镜子照见"));
      assertTrue("expert analysis points to free salon", HappinessDemo.renderExpertAnalysis(mixedResult).includes("免费幸福沙龙"));
      assertEqual("red status for low dimension", HappinessDemo.getDimensionStatus(5, 12).label, "红灯预警");
      assertEqual("yellow status for middle dimension", HappinessDemo.getDimensionStatus(8, 12).label, "黄灯调整");
      assertEqual("green status for high dimension", HappinessDemo.getDimensionStatus(10, 12).label, "绿灯稳定");
      assertEqual(
        "dimension labels are updated",
        HappinessDemo.DIMENSIONS.map((dimension) => dimension.label).join(" / "),
        "亲密互信（关系） / 用心倾听（沟通） / 生活仪式（温度） / 赋能赞美（鼓励） / 情绪修复（稳定）"
      );
    } catch (error) {
      record("test harness catches missing implementation", false, error.message);
    }

    Promise.all([
      fetch("./app.js?v=salon-note-3").then((response) => response.text()),
      fetch("./styles.css?v=salon-note-3").then((response) => response.text())
    ]).then(([js, css]) => {
      const resultSalonBlock = js.slice(js.indexOf("function renderSalonApplication"), js.indexOf("function renderSalonPage"));
      const salonPageBlock = js.slice(js.indexOf("function renderSalonPage"), js.indexOf("function renderResult"));
      assertTrue("intro no longer renders hero image", !js.includes("hero-visual"));
      assertTrue("intro removes fragmented point list", !js.includes("intro-points"));
      assertTrue("intro removes compact stat chips", !js.includes("intro-stats"));
      assertTrue("home title is happiness self check", js.includes("幸福自检表"));
      assertTrue("intro eyebrow is removed", !js.includes("家庭幸福能力自评"));
      assertTrue("copy avoids duplicated station owner wording", !js.includes("幸福驿站驿站主"));
      assertTrue("result removes tonight action block", !js.includes("今晚小行动"));
      assertTrue("result removes focus label chip", !js.includes("重点标识"));
      assertTrue("result CTA jumps to salon page", js.includes("data-action=\"salon\"") && js.includes("我要幸福"));
      assertTrue("salon page can render", js.includes("renderSalonPage") && js.includes("我申请参加幸福沙龙"));
      assertTrue("result keeps salon guidance compact", !resultSalonBlock.includes("salon-purpose-list") && !resultSalonBlock.includes("salon-marker"));
      assertTrue("salon page owns source and simple next step", salonPageBlock.includes("salon-purpose-list") && salonPageBlock.includes("下一步很简单"));
      assertTrue("salon page removes top kicker", !salonPageBlock.includes("salon-page-kicker"));
      assertTrue("salon page asks two questions", salonPageBlock.includes("SALON_QUESTION_ONE") && salonPageBlock.includes("SALON_QUESTION_TWO"));
      assertTrue("salon page includes screenshot note", salonPageBlock.includes("SALON_SCREENSHOT_NOTE"));
      assertTrue("salon application note is rendered in paragraphs", salonPageBlock.includes("SALON_APPLICATION_NOTES.map"));
      assertTrue("dimension pills use dimension colors", js.includes("dimension-${dimension.key}") && css.includes(".dimension-family"));
      assertTrue("radar uses richer gradient", js.includes("radarAura") && js.includes("#49b9ff") && js.includes("#7bd66f"));
      assertTrue("result renders salon guidance", js.includes("renderSalonApplication(result)") && js.includes("salon-promise-card"));
      assertTrue("result no longer renders lead form", !js.includes("data-lead-form") && !js.includes("lead-contact"));
      assertTrue("separate success screen is removed", !js.includes("renderSuccess") && !js.includes("setScreen(\"success\")"));
      assertTrue("salon guidance is styled", css.includes("salon-purpose-list") && css.includes("salon-final-cta"));
    }).catch((error) => {
      record("source checks can be loaded", false, error.message);
    });
  </script>
</body>
</html>
